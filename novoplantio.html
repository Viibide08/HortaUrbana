<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Plantio - Horta Urbana</title>
    <link rel="stylesheet" href="novoplantio.css">
</head>
<body>

    <main class="container">
        <header class="header-simples">
            <h1>Novo Plantio</h1>
            <h2>Registrar Novo Plantio</h2>
        </header>

        <section class="card-registro">
            <div class="campo">
                <label>Tipo de Cultura:</label>
                <select id="cultura">
                    <option value="Alface">Alface</option>
                    <option value="Tomate">Tomate</option>
                    <option value="Cenoura">Cenoura</option>
                </select>
            </div>

            <div class="campo">
                <label>Data de Plantio:</label>
                <input type="date" id="data-plantio">
            </div>

            <div class="campo">
                <label>Localização:</label>
                <div class="box-texto" id="local">Horta Centro-Norte</div>
            </div>

            <button class="btn-confirmar" onclick="salvarPlantio()">CONFIRMAR PLANTIO</button>
        </section>
    </main>

    <footer class="tab-bar">
        <a href="painelcontrole.html" class="tab-item"><span>🏠</span><p>PAINEL</p></a>
        <a href="novoplantio.html" class="tab-item active"><span>🌿</span><p>NOVO PLANTIO</p></a>
        <a href="mapahortas.html" class="tab-item"><span>📍</span><p>MAPA</p></a>
        <a href="login.html" class="tab-item"><span>🔑</span><p>LOGIN</p></a>
    </footer>

  <script src="script.js"></script>
</body>
</html>
