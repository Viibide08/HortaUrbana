<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horta Urbana - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <header>
        <h1>Horta Urbana 🌿</h1>
    </header>


            
        

<!-- login.html -->
<main class="login-container">
    <form class="login-box" id="loginForm">
        <h2>Formulário de login:</h2>
        <div class="input-group">
            <label>Escolha sua função:</label>
            <select id="funcao" required>
                <option value="" disabled selected>Selecione...</option>
                <option value="administrador">Administrador</option>  
                <option value="cuidador">Cuidador</option>
                <!-- opcoes do formulario de login -->
            </select>
        </div>
        <div class="input-group">
            <label>Digite sua senha:</label>
            <input type="password" required>
        </div>
        <button type="submit" class="btn-enviar">ENTRAR</button>
    </form>
</main>


<!-- //Java do login -->
<script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const funcao = document.getElementById('funcao').value;
        // Salva a função para usar na próxima página

        console.log(funcao);
        if(funcao === "administrador"){
            localStorage.setItem('usuarioFuncao', funcao);
            window.location.href = 'painelcontrole.html'; 

        }
        if(funcao === "cuidador"){
            localStorage.setItem('usuarioFuncao', funcao);
            window.location.href = 'novoplantio.html'; 
        // código que o irineu mandou usar

        }
        // localStorage.setItem('usuarioFuncao', funcao);
        // window.location.href = 'novoplantio.html'; 
        // código que o irineu mandou usar
    });
</script>

  
</body>
</html>
